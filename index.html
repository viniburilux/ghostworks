<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GhostWorks Radar — Transformações Territoriais Invisíveis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"><\/script>
<style>
:root{--bg:#060810;--bg2:#0d1117;--bg3:#111927;--amber:#FF9500;--amber-dim:#9A5A00;--teal:#00E5C0;--teal-dim:#006B5A;--red:#FF3B30;--red-dim:#7A1A15;--green:#30D158;--blue:#0A84FF;--text:#E8EDF4;--text-dim:#6B7A8D;--border:#1E2A38;--mono:'Space Mono',monospace;--sans:'Syne',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,192,.015) 2px,rgba(0,229,192,.015) 4px);pointer-events:none;z-index:9999}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:rgba(6,8,16,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:var(--mono);font-size:13px;color:var(--teal);letter-spacing:.12em;text-transform:uppercase}
.nav-logo span{color:var(--amber)}
.nav-links{display:flex;gap:32px}
.nav-links a{font-family:var(--mono);font-size:11px;color:var(--text-dim);text-decoration:none;letter-spacing:.08em;text-transform:uppercase;transition:color .2s}
.nav-links a:hover{color:var(--teal)}
.nav-badge{font-family:var(--mono);font-size:10px;color:var(--amber);border:1px solid var(--amber);padding:4px 10px;letter-spacing:.1em;animation:pulse-border 2s ease infinite}
@keyframes pulse-border{0%,100%{border-color:var(--amber);opacity:1}50%{border-color:var(--amber-dim);opacity:.7}}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:120px 80px 80px;position:relative;overflow:hidden}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,229,192,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,192,.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%)}
.hero-tag{font-family:var(--mono);font-size:11px;color:var(--teal);letter-spacing:.25em;text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.hero-tag::before{content:'';display:block;width:30px;height:1px;background:var(--teal)}
.hero-title{font-weight:800;font-size:clamp(52px,8vw,96px);line-height:.92;letter-spacing:-.02em;margin-bottom:32px}
.hero-title .l1{color:var(--text)}
.hero-title .l2{color:transparent;-webkit-text-stroke:1px var(--amber)}
.hero-title .l3{font-size:.42em;letter-spacing:.12em;font-weight:400;color:var(--text-dim);margin-top:16px;font-family:var(--mono)}
.hero-sub{font-family:var(--mono);font-size:15px;color:var(--text-dim);line-height:1.7;max-width:580px;margin-bottom:56px}
.hero-sub em{color:var(--text);font-style:normal}
.hero-stats{display:flex;gap:48px;flex-wrap:wrap}
.stat-item{display:flex;flex-direction:column;gap:6px}
.stat-num{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--teal);line-height:1}
.stat-label{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase}
.scroll-hint{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:.2em;text-transform:uppercase;display:flex;flex-direction:column;align-items:center;gap:8px}
.scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,var(--text-dim),transparent);animation:sb 1.5s ease infinite}
@keyframes sb{0%,100%{opacity:.3;transform:scaleY(.5) translateY(-10px)}50%{opacity:1;transform:scaleY(1) translateY(0)}}
.section{padding:100px 80px;position:relative}
.sec-tag{font-family:var(--mono);font-size:10px;color:var(--amber);letter-spacing:.25em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.sec-tag::before{content:'▶';font-size:8px}
.sec-title{font-weight:800;font-size:clamp(36px,5vw,60px);line-height:1.05;letter-spacing:-.02em;margin-bottom:20px;max-width:700px}
.sec-sub{font-family:var(--mono);font-size:13px;color:var(--text-dim);line-height:1.7;max-width:600px;margin-bottom:60px}
.ranking-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}
.ranking-chart{display:flex;flex-direction:column;gap:12px}
.rank-row{display:flex;align-items:center;gap:14px;opacity:0;transform:translateX(-20px);transition:all .5s ease}
.rank-row.vis{opacity:1;transform:translateX(0)}
.rank-num{font-family:var(--mono);font-size:10px;color:var(--text-dim);width:20px;text-align:right;flex-shrink:0}
.rank-bwrap{flex:1;height:32px;background:var(--bg3);border:1px solid var(--border);position:relative;overflow:hidden}
.rank-bar{height:100%;background:linear-gradient(90deg,var(--amber-dim),var(--amber));width:0%;transition:width 1s cubic-bezier(.4,0,.2,1)}
.rank-bar.ne{background:linear-gradient(90deg,var(--teal-dim),var(--teal))}
.rank-blabel{position:absolute;inset:0;display:flex;align-items:center;padding:0 12px;font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.9);z-index:2;justify-content:space-between;pointer-events:none}
.rank-pct{font-size:10px;color:rgba(255,255,255,.6)}
.rank-insight{padding:32px;border:1px solid var(--border);background:var(--bg2);position:sticky;top:100px}
.ins-title{font-family:var(--mono);font-size:10px;color:var(--teal);letter-spacing:.2em;text-transform:uppercase;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.ins-body{font-family:var(--mono);font-size:13px;color:var(--text-dim);line-height:1.8;margin-bottom:16px}
.ins-body strong{color:var(--teal)}
.ne-box{display:flex;flex-direction:column;gap:8px;padding:16px;background:rgba(0,229,192,.05);border:1px solid var(--teal-dim);margin-top:16px}
.ne-row{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:12px}
.ne-state{color:var(--teal)}
.ne-val{color:var(--text-dim)}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:0 80px}
.cases-section{padding:100px 80px}
.cases-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-bottom:2px}
.case-card{background:var(--bg2);border:1px solid var(--border);overflow:hidden;transition:border-color .3s,transform .3s;cursor:pointer}
.case-card:hover{border-color:var(--amber);transform:translateY(-2px)}
.iw{position:relative;aspect-ratio:1;overflow:hidden;background:#000;user-select:none}
.img-b,.img-a{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;image-rendering:pixelated;pointer-events:none}
.img-a{clip-path:inset(0 50% 0 0)}
.slider-zone{position:absolute;inset:0;cursor:col-resize;z-index:10}
.sline{position:absolute;top:0;bottom:0;left:50%;width:2px;background:var(--amber);transform:translateX(-1px);pointer-events:none}
.shandle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:32px;height:32px;border-radius:50%;background:var(--amber);display:flex;align-items:center;justify-content:center;pointer-events:none;font-size:14px;color:var(--bg);font-weight:700;box-shadow:0 0 20px rgba(255,149,0,.5)}
.ybadge{position:absolute;font-family:var(--mono);font-size:10px;letter-spacing:.1em;padding:4px 8px;background:rgba(0,0,0,.85);z-index:5;pointer-events:none}
.ybadge.bef{top:10px;left:10px;color:var(--text-dim);border:1px solid var(--text-dim)}
.ybadge.aft{top:10px;right:10px;color:var(--amber);border:1px solid var(--amber)}
.sat-badge{position:absolute;bottom:10px;left:10px;font-family:var(--mono);font-size:9px;color:var(--teal);letter-spacing:.1em;padding:3px 8px;background:rgba(0,229,192,.1);border:1px solid var(--teal-dim);z-index:5;pointer-events:none}
.cbody{padding:20px}
.crank{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:.15em;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.ctype{font-size:10px;padding:2px 8px}
.td{color:var(--red);border:1px solid var(--red-dim)}
.tm{color:var(--amber);border:1px solid var(--amber-dim)}
.ta{color:var(--green);border:1px solid rgba(48,209,88,.3)}
.tu{color:var(--blue);border:1px solid rgba(10,132,255,.3)}
.tx{color:var(--teal);border:1px solid var(--teal-dim)}
.cname{font-weight:700;font-size:17px;margin-bottom:8px;line-height:1.2}
.ccoords{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-bottom:16px}
.cmetrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-top:14px;border-top:1px solid var(--border)}
.metric{display:flex;flex-direction:column;gap:2px}
.mlabel{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
.mval{font-family:var(--mono);font-size:14px;font-weight:700}
.mval.p{color:var(--green)}.mval.n{color:var(--red)}.mval.x{color:var(--amber)}
.earth-btn{display:flex;align-items:center;gap:8px;margin-top:16px;padding:10px 14px;background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:var(--mono);font-size:11px;letter-spacing:.08em;cursor:pointer;text-decoration:none;width:100%;justify-content:center;transition:all .2s}
.earth-btn:hover{border-color:var(--teal);color:var(--teal);background:rgba(0,229,192,.05)}
.mini-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mini{background:var(--bg2);border:1px solid var(--border);padding:16px 14px;display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:border-color .2s}
.mini:hover{border-color:var(--amber)}
.mini-rk{font-family:var(--mono);font-size:9px;color:var(--text-dim);letter-spacing:.12em}
.mini-stt{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--amber);line-height:1}
.mini-coords{font-family:var(--mono);font-size:9px;color:var(--text-dim);line-height:1.5}
.mini-bar{height:2px;background:var(--border);position:relative;margin-top:auto}
.mini-fill{position:absolute;top:0;left:0;height:100%;background:var(--amber)}
.map-section{padding:100px 80px}
.map-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:40px;flex-wrap:wrap;gap:20px}
.legend{display:flex;gap:20px;flex-wrap:wrap;align-items:center}
.li{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--text-dim)}
.ldot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
#gmap{height:600px;border:1px solid var(--border);background:#0a0f1a}
.map-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-top:2px}
.ms{background:var(--bg2);border:1px solid var(--border);padding:20px}
.ms-n{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--teal);margin-bottom:4px}
.ms-l{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase}
.meth{padding:100px 80px;background:var(--bg2)}
.meth-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-top:40px}
.mcard{padding:28px;border:1px solid var(--border);background:var(--bg)}
.mn{font-family:var(--mono);font-size:28px;color:var(--teal);margin-bottom:12px}
.mt{font-weight:700;font-size:16px;margin-bottom:10px}
.md{font-family:var(--mono);font-size:12px;color:var(--text-dim);line-height:1.7}
footer{padding:60px 80px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr;gap:40px}
.ft{font-family:var(--mono);font-size:10px;color:var(--teal);letter-spacing:.2em;text-transform:uppercase;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.fb{font-family:var(--mono);font-size:12px;color:var(--text-dim);line-height:1.8}
.fb strong{color:var(--text)}
.fbadge{margin-top:40px;padding-top:24px;border-top:1px solid var(--border);grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.flogo{font-family:var(--mono);font-size:12px;color:var(--text-dim)}
.flogo span{color:var(--teal)}
.fcr{font-family:var(--mono);font-size:11px;color:var(--text-dim)}
@media(max-width:900px){nav{padding:16px 24px}.nav-links{display:none}.hero,.section,.cases-section,.map-section,.meth{padding:60px 24px}.divider{margin:0 24px}.ranking-grid{grid-template-columns:1fr}.cases-grid{grid-template-columns:1fr}.mini-row{grid-template-columns:repeat(2,1fr)}.map-stats{grid-template-columns:repeat(2,1fr)}.meth-grid{grid-template-columns:1fr 1fr}footer{grid-template-columns:1fr;padding:40px 24px}}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">Ghost<span>Works</span> // Radar</div>
  <div class="nav-links">
    <a href="#finding">O Achado</a>
    <a href="#cases">Top 10</a>
    <a href="#gmap">Mapa</a>
    <a href="#meth">Metodologia</a>
  </div>

</nav>

<section class="hero">
  <div class="hero-grid"></div>
  <div class="hero-tag">Sistema de Inteligência Territorial · Brasil</div>
  <h1 class="hero-title">
    <div class="l1">GHOST</div>
    <div class="l2">WORKS</div>
    <div class="l3">RADAR · BRAZIL</div>
  </h1>
  <p class="hero-sub">
    O Brasil se transforma em silêncio. <em>5.568 municípios</em> monitorados via
    imagem de satélite entre 2017 e 2024. Este radar detecta onde o território mudou
    de forma incomum — <em>antes que alguém perceba.</em>
  </p>
  <div class="hero-stats">
    <div class="stat-item"><div class="stat-num" id="c1">0</div><div class="stat-label">Municípios</div></div>
    <div class="stat-item"><div class="stat-num" id="c2">0</div><div class="stat-label">Anos de Dados</div></div>
    <div class="stat-item"><div class="stat-num" id="c3">0</div><div class="stat-label">Hotspots</div></div>
    <div class="stat-item"><div class="stat-num">4</div><div class="stat-label">Sensores Cruzados</div></div>
  </div>
  <div class="scroll-hint"><span>SCROLL</span><div class="scroll-line"></div></div>
</section>

<section class="section" id="finding">
  <div class="sec-tag">Achado Principal</div>
  <h2 class="sec-title">O Nordeste lidera. Ninguém estava olhando.</h2>
  <p class="sec-sub">O ranking revela um padrão contraintuitivo: estados nordestinos dominam a transformação territorial — não pelas razões esperadas, mas por dinâmicas que o monitoramento convencional ignora.</p>
  <div class="ranking-grid">
    <div class="ranking-chart" id="rc"></div>
    <div class="rank-insight">
      <div class="ins-title">// ANÁLISE DO PADRÃO</div>
      <p class="ins-body">A hipótese central: os estados nordestinos lideram por <strong>expansão de infraestrutura de energia renovável</strong> — parques eólicos e solares que alteram a paisagem em tempo recorde.</p>
      <p class="ins-body">Combinado com <strong>fronteiras agrícolas no MATOPIBA</strong> e <strong>garimpo ilegal</strong> na faixa amazônica, o Brasil revela uma transformação territorial invisível para métricas tradicionais.</p>
      <div class="ne-box">
        <div style="font-family:var(--mono);font-size:9px;color:var(--teal);letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;">Destaques Nordeste ↓</div>
        <div class="ne-row"><span class="ne-state">Alagoas</span><span class="ne-val">STT médio 0.048 · #3 Brasil</span></div>
        <div class="ne-row"><span class="ne-state">Pernambuco</span><span class="ne-val">STT max 0.198 · #4 Brasil</span></div>
        <div class="ne-row"><span class="ne-state">Rio Grande do Norte</span><span class="ne-val">STT médio 0.045 · #5</span></div>
        <div class="ne-row"><span class="ne-state">Sergipe</span><span class="ne-val">STT médio 0.044 · #8</span></div>
        <div class="ne-row"><span class="ne-state">Paraíba</span><span class="ne-val">STT médio 0.043 · #10</span></div>
      </div>
    </div>
  </div>
</section>

<div class="divider"></div>

<section class="cases-section" id="cases">
  <div class="sec-tag">Top 10 Casos</div>
  <h2 class="sec-title">Os eventos mais intensos detectados</h2>
  <p class="sec-sub">Arraste a linha central para comparar o território em 2019 vs 2023. Imagens reais de satélite.</p>
  <div class="cases-grid" id="top3"></div>
  <div class="mini-row" id="mini7"></div>
</section>

<div class="divider"></div>

<section class="map-section">
  <div class="sec-tag">Mapa Interativo</div>
  <h2 class="sec-title">Top 50 Hotspots · Brasil</h2>
  <p class="sec-sub">Os 50 eventos de maior transformação territorial detectados entre 2017–2024. Clique em qualquer ponto para investigar no Google Earth.</p>
  <div class="map-head">
    <div></div>
    <div class="legend">
      <div class="li"><div class="ldot" style="background:#FF3B30"></div>Desmatamento</div>
      <div class="li"><div class="ldot" style="background:#FF9500"></div>Garimpo</div>
      <div class="li"><div class="ldot" style="background:#30D158"></div>Expansão Agrícola</div>
      <div class="li"><div class="ldot" style="background:#0A84FF"></div>Expansão Urbana</div>
      <div class="li"><div class="ldot" style="background:#00E5C0"></div>Mista</div>
    </div>
  </div>
  <div id="gmap"></div>
  <div class="map-stats">
    <div class="ms"><div class="ms-n">50</div><div class="ms-l">Hotspots exibidos</div></div>
    <div class="ms"><div class="ms-n">0.763</div><div class="ms-l">TTI máximo</div></div>
    <div class="ms"><div class="ms-n">1.096</div><div class="ms-l">Dataset completo</div></div>
    <div class="ms"><div class="ms-n">7 anos</div><div class="ms-l">Série temporal</div></div>
  </div>
</section>

<section class="meth" id="meth">
  <div class="sec-tag">Metodologia</div>
  <h2 class="sec-title">Como o GhostWorks detecta</h2>
  <div class="meth-grid">
    <div class="mcard"><div class="mn">01</div><div class="mt">Imagens de Satélite</div><div class="md">Google Earth Engine + Sentinel-2. Cobertura anual de todos os 5.568 municípios.</div></div>
    <div class="mcard"><div class="mn">02</div><div class="mt">AlphaEarth Embeddings</div><div class="md">Embeddings semânticos territoriais. Captura padrões invisíveis para análise espectral tradicional.</div></div>
    <div class="mcard"><div class="mn">03</div><div class="mt">Score TTI</div><div class="md">Territorial Transformation Index: NDVI × Luminosidade × Infraestrutura × sinal semântico composto.</div></div>
    <div class="mcard"><div class="mn">04</div><div class="mt">Detecção de Anomalias</div><div class="md">Clustering geoespacial identifica eventos anômalos. Validado com Planet Labs a 3m de resolução.</div></div>
  </div>
</section>

  <div><div class="ft">// Sobre</div><p class="fb"><strong>LuxVerso Research Initiative</strong><br/>Salvador, Bahia<br/>Pesquisa independente em<br/>inteligência territorial aplicada.</p></div>

function classify(d){
  if(d.ndvi_change<-0.15&&d.lights_change>=0)return'deforestation';
  if(d.ndvi_change<-0.05&&d.lights_change<0.05)return'mining';
  if(d.ndvi_change>0.1&&d.lights_change>0.05)return'agro';
  if(d.lights_change>0.18)return'urban';
  return'mixed';
}

  if(lat>0)return'Roraima / Norte Amazônico';
  if(lon<-60&&lat<0)return'Amazônia Ocidental';
  if(lon<-50&&lat<-5&&lat>-20)return'Amazônia / Centro-Oeste';
  if(lon>-50&&lon<-37&&lat<-5&&lat>-20)return'Bahia / Nordeste';
  if(lon>-37&&lat<0)return'Nordeste';
  if(lat<-25)return'Sul do Brasil';
  return'Brasil Central';
}
function ctitle(d){
  const t=classify(d),r=region(d.lat,d.lon);
  const nm={deforestation:`Desmatamento — ${r}`,mining:`Garimpo — ${r}`,agro:`Fronteira Agrícola — ${r}`,urban:`Expansão Urbana — ${r}`,mixed:`Transformação — ${r}`};
  return nm[t];
}
function typebadge(d){const t=classify(d),m=TM[t];return`<span class="ctype ${m.k}">${m.l}</span>`}

// RANKING
const NE=['Alagoas','Pernambuco','Rio','Sergipe','Paraíba','Ceará','Maranhão','Piauí'];
function buildRanking(){
  const el=document.getElementById('rc');
  if(!el||el.dataset.built)return;
  el.dataset.built=1;
  const mx=Math.max(...RANKING.map(r=>r.stt_medio));
  el.innerHTML=RANKING.map((r,i)=>{
    const pct=(r.stt_medio/mx*100).toFixed(1);
    const ne=NE.some(n=>r.estado.includes(n));
    return`<div class="rank-row" id="rr${i}" style="transition-delay:${i*.07}s">
      <div class="rank-num">${r.rank}</div>
      <div class="rank-bwrap">
        <div class="rank-bar${ne?' ne':''}" id="rb${i}"></div>
        <div class="rank-blabel"><span>${r.estado}</span><span class="rank-pct">${r.stt_medio.toFixed(4)}</span></div>
      </div>
    </div>`;
  }).join('');
  setTimeout(()=>{
    RANKING.forEach((_,i)=>{
      const pct=(RANKING[i].stt_medio/mx*100).toFixed(1);
      document.getElementById(`rr${i}`).classList.add('vis');
      setTimeout(()=>{const b=document.getElementById(`rb${i}`);if(b)b.style.width=pct+'%'},i*70+200);
    });
  },200);
}

// SLIDER
function initSlider(id){
  const wrap=document.getElementById(`iw${id}`);
  const afimg=document.getElementById(`ai${id}`);
  const ln=document.getElementById(`sl${id}`);
  const hd=document.getElementById(`sh${id}`);
  if(!wrap)return;
  let drag=false;
  function setPos(x){
    const r=wrap.getBoundingClientRect();
    const p=Math.max(0,Math.min(1,(x-r.left)/r.width));
    afimg.style.clipPath=`inset(0 ${((1-p)*100).toFixed(1)}% 0 0)`;
    ln.style.left=hd.style.left=(p*100).toFixed(1)+'%';
  }
  const sz=document.getElementById(`sz${id}`);
  sz.addEventListener('mousedown',e=>{drag=true;setPos(e.clientX);e.preventDefault();});
  sz.addEventListener('touchstart',e=>{drag=true;setPos(e.touches[0].clientX);},{passive:true});
  window.addEventListener('mousemove',e=>{if(drag)setPos(e.clientX)});
  window.addEventListener('touchmove',e=>{if(drag)setPos(e.touches[0].clientX)},{passive:true});
  window.addEventListener('mouseup',()=>drag=false);
  window.addEventListener('touchend',()=>drag=false);
}

// FEATURED CARDS
const FEAT=[
  {...TOP50[0],ib:IMG.p05b,ia:IMG.p05a,sid:'Sentinel·P05'},
  {...TOP50[3],ib:IMG.p08b,ia:IMG.p08a,sid:'Sentinel·P08'},
  {...TOP50[5],ib:IMG.p10b,ia:IMG.p10a,sid:'Sentinel·P10'},
];
function buildTop3(){
  document.getElementById('top3').innerHTML=FEAT.map((d,i)=>{
    const t=classify(d),m=TM[t];
    return`<div class="case-card">
      <div class="iw" id="iw${i}">
        <img class="img-b" src="${d.ib}"/>
        <img class="img-a" id="ai${i}" src="${d.ia}"/>
        <div class="ybadge bef">2019</div>
        <div class="ybadge aft">2023</div>
        <div class="sat-badge">🛰 ${d.sid}</div>
        <div class="slider-zone" id="sz${i}">
          <div class="sline" id="sl${i}"></div>
          <div class="shandle" id="sh${i}">⟷</div>
        </div>
      </div>
      <div class="cbody">
        <div class="crank"><span>#${i+1} de 1.096</span>${typebadge(d)}</div>
        <div class="cname">${ctitle(d)}</div>
        <div class="ccoords">${d.lat.toFixed(4)}°, ${d.lon.toFixed(4)}° · TTI ${fmt3(d.stt)}</div>
        <div class="cmetrics">
          <div class="metric"><div class="mlabel">Vegetação</div><div class="mval ${chcls(d.ndvi_change,true)}">${fmt(d.ndvi_change)}</div></div>
          <div class="metric"><div class="mlabel">Luminosidade</div><div class="mval ${chcls(d.lights_change,false)}">${fmt(d.lights_change)}</div></div>
          <div class="metric"><div class="mlabel">Score TTI</div><div class="mval x">${fmt3(d.stt)}</div></div>
          <div class="metric"><div class="mlabel">Estrutura</div><div class="mval ${chcls(d.built_change,false)}">${fmt(d.built_change)}</div></div>
        </div>
        <a class="earth-btn" href="${earth(d.lat,d.lon)}" target="_blank">🌍 &nbsp;Abrir no Google Earth</a>
      </div>
    </div>`;
  }).join('');
  [0,1,2].forEach(initSlider);
}

function buildMini(){
  document.getElementById('mini7').innerHTML=TOP50.slice(3,10).map((d,i)=>{
    const t=classify(d),m=TM[t],pct=(d.stt/TOP50[0].stt*100).toFixed(0);
    return`<div class="mini" onclick="window.open('${earth(d.lat,d.lon)}','_blank')">
      <div class="mini-rk">#${i+4} / 1096</div>
      <div class="mini-stt">${fmt3(d.stt)}</div>
      <div class="mini-coords">${d.lat.toFixed(2)}°<br>${d.lon.toFixed(2)}°</div>
      <span class="ctype ${m.k}" style="font-size:9px;padding:2px 6px;align-self:flex-start">${m.l}</span>
      <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function buildMap(){
  const map=L.map('gmap',{center:[-12,-51],zoom:4,zoomControl:true,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
  const style=document.createElement('style');
  style.textContent=`.gw-popup .leaflet-popup-content-wrapper{background:transparent;padding:0;border:none;box-shadow:none}.gw-popup .leaflet-popup-tip{background:#1E2A38}`;
  document.head.appendChild(style);
  TOP50.forEach((d,i)=>{
    const t=classify(d),m=TM[t],r=6+(d.stt/TOP50[0].stt)*14;
    const mk=L.circleMarker([d.lat,d.lon],{radius:r,fillColor:m.c,color:m.c,weight:1,opacity:.9,fillOpacity:.3}).addTo(map);
    mk.bindPopup(`<div style="font-family:'Space Mono',monospace;font-size:11px;background:#0d1117;color:#E8EDF4;padding:12px 14px;min-width:200px;border:1px solid #1E2A38">
      <div style="font-size:9px;color:#00E5C0;letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #1E2A38">Transformação Detectada</div>
      <div style="margin-bottom:8px"><span style="color:#6B7A8D">Rank:</span> <strong>#${i+1}</strong> / 1.096<br><span style="color:#6B7A8D">Score TTI:</span> <strong style="color:#FF9500">${fmt3(d.stt)}</strong><br><span style="color:#6B7A8D">Tipo:</span> <strong style="color:${m.c}">${m.l}</strong></div>
      <div style="margin-bottom:10px;font-size:10px;color:#6B7A8D">Vegetação: <strong style="color:${d.ndvi_change<0?'#FF3B30':'#30D158'}">${fmt(d.ndvi_change)}</strong> &nbsp; Luz: <strong style="color:#FF9500">${fmt(d.lights_change)}</strong></div>
      <a href="${earth(d.lat,d.lon)}" target="_blank" style="display:block;text-align:center;padding:8px;background:rgba(0,229,192,.08);border:1px solid #006B5A;color:#00E5C0;text-decoration:none;font-size:10px;letter-spacing:.1em">🌍 ABRIR NO GOOGLE EARTH</a>
    </div>`,{maxWidth:260,className:'gw-popup'});
    mk.on('mouseover',function(){this.setStyle({fillOpacity:.7,weight:2})});
    mk.on('mouseout',function(){this.setStyle({fillOpacity:.3,weight:1})});
  });
}

function counter(id,target,dur){
  const el=document.getElementById(id);
  if(!el)return;
  let s=null;
  const step=ts=>{if(!s)s=ts;const p=Math.min((ts-s)/dur,1);el.textContent=Math.round(p*target).toLocaleString('pt-BR');if(p<1)requestAnimationFrame(step)};
  requestAnimationFrame(step);
}

const io=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting&&x.target.id==='finding')buildRanking()}),{threshold:.1});

document.addEventListener('DOMContentLoaded',()=>{
  buildTop3();
  buildMini();
  buildMap();
  counter('c1',5568,1800);
  counter('c2',7,800);
  counter('c3',1096,1400);
  const f=document.getElementById('finding');
  if(f)io.observe(f);
});
</script>
